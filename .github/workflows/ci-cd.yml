name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ data_pipeline/ great_expectations/ --output-format=github

      - name: Black check
        run: black --check app/ data_pipeline/ great_expectations/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short --cov=data_pipeline --cov=app --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Verify imports
        run: |
          python -c "from app.main import app; print('App import OK')"
          python -c "from data_pipeline.bronze.bronze_orchestrator import BronzeOrchestrator; print('Orchestrator import OK')"
          python -c "from data_pipeline.dbt_runner import run_full_pipeline; print('dbt runner import OK')"
          python -c "from great_expectations.validate import NZHabitatValidator; print('GE validator import OK')"
          python -c "from data_pipeline.orchestration.flows.daily_pipeline import run_daily_pipeline; print('Prefect daily pipeline import OK')"
          python -c "from data_pipeline.orchestration.tasks.bronze_tasks import ingest_world_bank; print('Prefect bronze tasks import OK')"
          python -c "from data_pipeline.orchestration.tasks.silver_tasks import compute_affordability; print('Prefect silver tasks import OK')"

  dbt:
    name: dbt Transformations
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dbt seed
        working-directory: dbt_nz
        run: dbt seed --profiles-dir .

      - name: Run dbt models
        working-directory: dbt_nz
        run: dbt run --profiles-dir . --target dev

      - name: Run dbt tests
        working-directory: dbt_nz
        run: dbt test --profiles-dir .

      - name: Generate dbt docs
        working-directory: dbt_nz
        run: dbt docs generate --profiles-dir .

      - name: Upload dbt docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt_nz/target/index.html
          retention-days: 7

  pipeline:
    name: Data Pipeline + Validation
    runs-on: ubuntu-latest
    needs: dbt
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run enhanced pipeline (bronze -> silver -> dbt -> GE)
        run: python data_pipeline/run_enhanced_pipeline.py --force

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            data_pipeline/bronze/*.json
            data_pipeline/silver/*.parquet
            data_pipeline/gold/*.parquet
            great_expectations/validations/*.json
          retention-days: 7

  prefect:
    name: Prefect Flow Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Prefect flows compile
        run: |
          python -c "
          from data_pipeline.orchestration.flows.daily_pipeline import run_daily_pipeline
          from data_pipeline.orchestration.flows.scheduled_flows import (
              run_daily_ingestion,
              run_weekly_ingestion,
              run_monthly_ingestion,
              run_full_pipeline,
          )
          print('All Prefect flows import successfully')
          print(f'Daily pipeline: {run_daily_pipeline.name}')
          print(f'Daily ingestion: {run_daily_ingestion.name}')
          print(f'Weekly ingestion: {run_weekly_ingestion.name}')
          print(f'Monthly ingestion: {run_monthly_ingestion.name}')
          print(f'Full pipeline: {run_full_pipeline.name}')
          "

      - name: Validate prefect.yaml
        run: |
          python -c "
          import yaml
          with open('prefect.yaml', 'r') as f:
              config = yaml.safe_load(f)
          deployments = config.get('deployments', [])
          print(f'prefect.yaml valid: {len(deployments)} deployments defined')
          for d in deployments:
              print(f\"  - {d['name']}: {d.get('schedule', 'manual')}\")
          "

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nz-habitat-intelligence:latest .

      - name: Verify container starts
        run: |
          docker run --rm nz-habitat-intelligence:latest -c "from app.main import app; print('Container OK')"
